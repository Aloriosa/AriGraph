# General settings
seed: 42
device: cuda

# Probe training
probe:
  model_name: gpt2-medium
  batch_size: 8
  lr: 1e-4
  epochs: 3
  output_path: outputs/probe

# DPO training
dpo:
  base_model: gpt2-medium
  target_model: gpt2-medium-dpo
  lr: 1e-6
  beta: 0.1
  batch_size: 4
  epochs: 3
  max_new_tokens: 20
  output_path: outputs/dpo

# Evaluation
eval:
  max_new_tokens: 20
  toxicity_model: unitary/toxicbert
  toxicity_threshold: 0.5
  wikitext_split: train
  wiki_num: 2000
  realtoxicity_prompts: realtoxicityprompts