# Hyper-parameters for the simplified DPMs-ANT training

train:
  epochs: 1                # number of passes over the dataset
  batch_size: 2            # batch size (small because we have only 10 images)
  learning_rate: 5e-5
  num_steps: 300           # total training steps (epochs * len(dataset) / batch_size)
  gamma: 5.0               # similarity-guided scaling (unused but kept for API)
  adversarial_steps: 1     # inner maximization steps
  adversarial_lr: 0.02     # inner learning rate
  schedule_type: "linear"  # diffusion scheduler type

generate:
  num_samples: 10          # number of images to generate
  seed: 42
  steps: 50                # denoising steps (reduced for speed)