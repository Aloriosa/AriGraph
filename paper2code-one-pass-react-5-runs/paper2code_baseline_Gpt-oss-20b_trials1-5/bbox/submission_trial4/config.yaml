# Configuration for the toy BBox‑Adapter experiment

# Paths
data_dir: data
output_dir: output

# Training hyperparameters
seed: 42
num_epochs: 5
batch_size: 2
learning_rate: 2e-5
weight_decay: 0.01

# Black‑box LLM
llm_name: gpt2
generation:
  num_candidates: 4          # negatives per example
  temperature: 0.7
  top_k: 50
  max_length: 50

# Adapter
adapter:
  encoder_name: distilbert-base-uncased
  hidden_dim: 768
  dropout: 0.1