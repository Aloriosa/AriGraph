# General
seed: 42
device: cuda  # set to 'cpu' if CUDA not available

# Simulation / Benchmark
prior_mean: 0.0
prior_std: 0.31622776601  # sqrt(0.1)
simulator_std: 0.31622776601  # sqrt(0.1)
x_observation: 1.0  # observation from the simulator

# SDE parameters (VE SDE)
sigma_min: 0.01
sigma_max: 1.5
T: 1.0  # final time

# Training
rounds: 5
sim_per_round: 2000   # number of parameter simulations per round
batch_size: 256
lr: 1e-4
epochs: 10
epsilon_trunc: 0.001  # truncation threshold for HPR

# Sampling
num_samples: 5000   # samples to draw from posterior for evaluation
sample_steps: 100   # number of ODE steps for probability‑flow integration