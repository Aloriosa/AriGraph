# Hyper‑parameters and training settings
seed: 42
device: cuda
num_tasks: 10            # number of class‑incremental tasks
classes_per_task: 10
batch_size: 32
num_epochs: 5
lr_adapter: 0.005
lr_rd: 0.01
weight_decay: 0.0
rd_hidden_dim: 128       # hidden size of the AE representation descriptor
expansion_threshold: 1.5
expand_layers: [7, 8, 9] # indices of the last 3 ViT layers to consider for expansion
max_layers: 12           # total number of ViT blocks (Vit-B/16 has 12)