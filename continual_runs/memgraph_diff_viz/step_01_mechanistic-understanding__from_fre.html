    const container = document.getElementById('graph');
    const data = {
      nodes: new vis.DataSet(PAYLOAD.nodes),
      edges: new vis.DataSet(PAYLOAD.edges),
    };
    const options = {
      interaction: { hover: true },
      physics: { stabilization: true },
      edges: { smooth: true },
    };
    const network = new vis.Network(container, data, options);

    function tripletText(t) {
      return `${t[0]} —[${t[1]}]→ ${t[2]}`;
    }

    function renderLists(filter) {
      const f = (filter || '').toLowerCase().trim();
      const lists = document.getElementById('lists');

      function matchTriplet(t) {
        if (!f) return true;
        return (t[0] + ' ' + t[1] + ' ' + t[2]).toLowerCase().includes(f);
      }

      function matchLink(item) {
        if (!f) return true;
        const t = item[0];
        const l = item[1];
        const s = (t[0] + ' ' + t[1] + ' ' + t[2] + ' ' + (l.path || '') + ' ' + (l.line_start ?? '')).toLowerCase();
        return s.includes(f);
      }

      function renderTripletItems(title, cls, triplets) {
        const rows = triplets.filter(matchTriplet).slice(0, 200).map(t => `
          <div class="item ${cls} mono">${tripletText(t)}</div>
        `).join('');
        return `
          <div class="section">
            <h3>${title} <span class="muted">(${triplets.length})</span></h3>
            <div class="list">${rows || `<div class="muted">No matches.</div>`}</div>
          </div>
        `;
      }

      function renderLinkItems(title, items) {
        const rows = items.filter(matchLink).slice(0, 200).map(it => {
          const t = it[0];
          const l = it[1];
          const loc = (l.line_start != null) ? `${l.path}:${l.line_start}` : `${l.path}`;
          return `<div class="item mono"><div>${tripletText(t)}</div><div class="muted">${loc} (conf=${l.confidence ?? 'n/a'})</div></div>`;
        }).join('');
        return `
          <div class="section">
            <h3>${title} <span class="muted">(${items.length})</span></h3>
            <div class="list">${rows || `<div class="muted">No matches.</div>`}</div>
          </div>
        `;
      }

      function renderConfChanged(title, items) {
        const rows = items.slice(0, 200).map(it => {
          const t = it[0];
          const before = it[1];
          const after = it[2];
          const loc = (after.line_start != null) ? `${after.path}:${after.line_start}` : `${after.path}`;
          return `<div class="item mono"><div>${tripletText(t)}</div><div class="muted">${loc} conf: ${before.confidence ?? 'n/a'} → ${after.confidence ?? 'n/a'}</div></div>`;
        }).join('');
        return `
          <div class="section">
            <h3>${title} <span class="muted">(${items.length})</span></h3>
            <div class="list">${rows || `<div class="muted">None.</div>`}</div>
          </div>
        `;
      }

      const htmlOut = [
        renderTripletItems("Triplets added", "added", DIFF.triplets.added),
        renderTripletItems("Triplets removed", "removed", DIFF.triplets.removed),
        renderLinkItems("Links added", DIFF.links.added),
        renderLinkItems("Links removed", DIFF.links.removed),
        renderConfChanged("Link confidence changed", DIFF.links.confidence_changed),
      ].join('');
      lists.innerHTML = htmlOut;
    }

    function highlightGraph(filter) {
      const f = (filter || '').toLowerCase().trim();
      if (!f) {
        // reset node styles
        const all = data.nodes.get();
        data.nodes.update(all.map(n => ({...n, color: undefined})));
        return;
      }
      const all = data.nodes.get();
      const updates = all.map(n => {
        const hit = (n.label || '').toLowerCase().includes(f);
        if (hit) {
          return { id: n.id, color: { background: "#ffe08a", border: "#d79c00" } };
        }
        return { id: n.id, color: undefined };
      });
      data.nodes.update(updates);
    }

    const q = document.getElementById('q');
    q.addEventListener('input', () => {
      const v = q.value;
      renderLists(v);
      highlightGraph(v);
    });

    renderLists("");
  </script>
