learning_rate: 5e-5
batch_size: 16
epochs: 10
weight_decay: 0.01
gradient_clipping: 1.0
loss_weights:
  reconstruction: 1.0
  diffusion: 0.5
diffusion_schedule:
  type: cosine
  num_steps: 1000
  beta_start: 0.0001
  beta_end: 0.02
optimizer: adam
lr_scheduler: cosine
train_val_split: 0.8
test_set_holdout: true
gradient_accumulation_steps: 1