        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {

              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#0000FF", "font": {"color": "black"}, "id": "inequality and conflict", "label": "inequality and conflict", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "constitutions and international instruments", "label": "constitutions and international instruments", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "transparency and accountability measures", "label": "transparency and accountability measures", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "integrated and holistic approaches", "label": "integrated and holistic approaches", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "social justice and inclusion", "label": "social justice and inclusion", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "fundamental freedoms and rights", "label": "fundamental freedoms and rights", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "sustainable development and peace", "label": "sustainable development and peace", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "protection of vulnerable groups", "label": "protection of vulnerable groups", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "legal frameworks and institutional reforms", "label": "legal frameworks and institutional reforms", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "equal treatment and access to opportunities", "label": "equal treatment and access to opportunities", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "abuse of authority and corruption", "label": "abuse of authority and corruption", "shape": "point"}, {"color": "#0000FF", "font": {"color": "black"}, "id": "public trust and democratic institutions", "label": "public trust and democratic institutions", "shape": "point"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "inequality and conflict", "label": "address root causes of", "to": "integrated and holistic approaches"}, {"arrows": "to", "from": "constitutions and international instruments", "label": "enshrined in", "to": "fundamental freedoms and rights"}, {"arrows": "to", "from": "constitutions and international instruments", "label": "provide legal basis for", "to": "protection of vulnerable groups"}, {"arrows": "to", "from": "transparency and accountability measures", "label": "restored through", "to": "public trust and democratic institutions"}, {"arrows": "to", "from": "transparency and accountability measures", "label": "implemented through", "to": "legal frameworks and institutional reforms"}, {"arrows": "to", "from": "integrated and holistic approaches", "label": "achievable through", "to": "sustainable development and peace"}, {"arrows": "to", "from": "social justice and inclusion", "label": "promote", "to": "equal treatment and access to opportunities"}, {"arrows": "to", "from": "social justice and inclusion", "label": "key components of", "to": "sustainable development and peace"}, {"arrows": "to", "from": "fundamental freedoms and rights", "label": "designed to protect", "to": "legal frameworks and institutional reforms"}, {"arrows": "to", "from": "protection of vulnerable groups", "label": "ensures", "to": "equal treatment and access to opportunities"}, {"arrows": "to", "from": "abuse of authority and corruption", "label": "undermine", "to": "public trust and democratic institutions"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {

        }
    },
    "interaction": {

        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "repulsion": {
            "centralGravity": 0.2,
            "damping": 0.09,
            "nodeDistance": 200,
            "springConstant": 0.05,
            "springLength": 100
        },
        "solver": "repulsion",
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
